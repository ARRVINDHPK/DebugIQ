version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: debugiq-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PORT=5000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: debugiq-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

name: Backend CI

on:
  push:
    paths:
      - "**.py"
      - "requirements.txt"
      - "Dockerfile.backend"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "**.py"
      - "requirements.txt"
      - "Dockerfile.backend"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import check
        run: |
          python -m py_compile api.py analysis.py classifier.py clustering.py dashboard.py database.py main.py parser.py preprocess.py ranking.py recommendations.py report_generator.py